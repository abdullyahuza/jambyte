name: Build Electron Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Skip postinstall (electron-rebuild) — electron-builder handles
        # native module rebuild for the correct Electron ABI automatically
        run: npm install --ignore-scripts

      - name: Build app (Vite + electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: JAMB-CBT-Windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error
